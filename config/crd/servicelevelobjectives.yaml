apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: servicelevelobjectives.sre.charanvamsy.dev
  labels:
    app.kubernetes.io/part-of: slo-operator
spec:
  group: sre.charanvamsy.dev
  scope: Namespaced
  names:
    kind: ServiceLevelObjective
    listKind: ServiceLevelObjectiveList
    plural: servicelevelobjectives
    singular: servicelevelobjective
    shortNames:
      - slo
      - slos
    categories:
      - sre
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Service
          type: string
          jsonPath: .spec.service
        - name: Objective
          type: string
          jsonPath: .spec.objective
        - name: Window
          type: string
          jsonPath: .spec.window
        - name: Budget %
          type: string
          jsonPath: .status.errorBudget.remainingPercent
        - name: Ready
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].status
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [service, objective, sli]
              properties:
                service:
                  type: string
                  minLength: 1
                  description: Name of the service this SLO applies to (exposed as the sre_service label).
                objective:
                  type: number
                  minimum: 0
                  exclusiveMinimum: true
                  maximum: 100
                  exclusiveMaximum: true
                  description: Target success percentage over the window, e.g. 99.9.
                window:
                  type: string
                  enum: ["30d"]
                  default: "30d"
                  description: Rolling SLO compliance window. Only 30d is supported.
                description:
                  type: string
                  description: Free-form description, surfaced in alert annotations.
                sli:
                  type: object
                  required: [events]
                  properties:
                    events:
                      type: object
                      required: [errorQuery, totalQuery]
                      properties:
                        errorQuery:
                          type: string
                          minLength: 1
                          description: PromQL template counting bad events over {{.window}}.
                        totalQuery:
                          type: string
                          minLength: 1
                          description: PromQL template counting all events over {{.window}}.
                labels:
                  type: object
                  additionalProperties:
                    type: string
                  description: Extra labels added to all generated recording and alerting rules.
                annotations:
                  type: object
                  additionalProperties:
                    type: string
                  description: Extra annotations added to all generated alerting rules.
                alerting:
                  type: object
                  properties:
                    disable:
                      type: boolean
                      default: false
                      description: Disable burn-rate alert generation (recording rules still generated).
                    pageLabels:
                      type: object
                      additionalProperties:
                        type: string
                    ticketLabels:
                      type: object
                      additionalProperties:
                        type: string
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
              properties:
                observedGeneration:
                  type: integer
                prometheusRuleName:
                  type: string
                recordingRules:
                  type: integer
                alertingRules:
                  type: integer
                errorBudget:
                  type: object
                  properties:
                    remainingPercent:
                      type: string
                    burnRate:
                      type: string
                    lastEvaluated:
                      type: string
                conditions:
                  type: array
                  items:
                    type: object
                    required: [type, status]
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                      observedGeneration:
                        type: integer
