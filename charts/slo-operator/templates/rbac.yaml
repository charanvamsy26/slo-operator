{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "slo-operator.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "slo-operator.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "slo-operator.fullname" . }}
  labels:
    {{- include "slo-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: ["sre.charanvamsy.dev"]
    resources: ["servicelevelobjectives"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["sre.charanvamsy.dev"]
    resources: ["servicelevelobjectives/status"]
    verbs: ["get", "patch", "update"]
  - apiGroups: ["monitoring.coreos.com"]
    resources: ["prometheusrules"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "slo-operator.fullname" . }}
  labels:
    {{- include "slo-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "slo-operator.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "slo-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
